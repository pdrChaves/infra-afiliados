services:
  postgres:
    image: postgres:16
    container_name: afiliados_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # script de init roda só na PRIMEIRA vez que o volume é criado
      - ./init:/docker-entrypoint-initdb.d
    ports:
      # expõe a porta pro host pra você inspecionar com DBeaver/psql se quiser
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: afiliados_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- timezone (importante pro agendamento dos posts) ---
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      # --- n8n usa o MESMO postgres pra guardar os workflows/execucoes ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # --- seguranca / login do painel n8n ---
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      # --- chave de criptografia das credenciais salvas no n8n ---
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # --- acesso local ---
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # --- permite usar o node "Code" com libs externas se precisar depois ---
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,cheerio
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  n8n_data:
